    <!-- Main Content -->
    <main>
      <section class="page-section">
        <div class="calculator-section">
          <div id="transplant-calculator">
            <h2>Transplant Day Calculator</h2>
            <p>Calculate the number of days since your transplant procedure.</p>

            <div>
              <div class="form-group">
                <label for="transplant-start-date">Transplant Date</label>
                <input id="transplant-start-date" type="date" class="start-date-input" />
              </div>

              <div class="form-group">
                <label for="transplant-target-date">Target Date (defaults to today)</label>
                <input id="transplant-target-date" type="date" class="target-date-input" />
                <div class="quick-buttons">
                  <button class="quick-btn btn-today" aria-label="Set target date to today">Today</button>
                  <button class="quick-btn btn-tomorrow" aria-label="Set target date to tomorrow">Tomorrow</button>
                </div>
              </div>
            </div>

            <div class="error-message"></div>

            <div class="result-box" role="region" aria-live="polite" tabindex="-1">
              <p class="result-label">Days Since Transplant</p>
              <p class="result-number">0</p>
              <p class="result-unit">Days</p>
            </div>

            <div class="placeholder-box show">Enter a date to see the result</div>
          </div>
        </div>
      </section>
    </main>

    <script src="utils.js"></script>
    <script src="nav.js"></script>
    <script src="calculator.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        initializeCalculator('transplant-calculator', transplantDaysSince, 'Days Since Transplant');
      });
    </script>
